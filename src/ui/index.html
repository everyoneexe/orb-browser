<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="orb://chrome/style.css">
    <title>Orb Chrome</title>
</head>
<body>
    <div id="sidebar">
        <!-- Top bar -->
        <div id="sidebar-header">
            <button id="menu-btn" title="Menu">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <circle cx="2" cy="7" r="1.5" fill="currentColor"/>
                    <circle cx="7" cy="7" r="1.5" fill="currentColor"/>
                    <circle cx="12" cy="7" r="1.5" fill="currentColor"/>
                </svg>
            </button>
            <span id="logo">O</span>
            <div id="nav-buttons">
                <button id="back-btn" title="Back">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button id="fwd-btn" title="Forward">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button id="reload-btn" title="Reload">
                    <svg id="reload-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M2 8a6 6 0 1 1 1.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M2 12V8h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <svg id="stop-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" style="display:none">
                        <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- URL bar with bookmark star -->
        <div id="url-bar-container">
            <span id="ssl-icon" title="Connection">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                    <path id="ssl-lock" d="M4 7V5a4 4 0 1 1 8 0v2h1a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1h1z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                </svg>
            </span>
            <input id="url-bar" type="text" placeholder="Search or enter URL" spellcheck="false" autocomplete="off">
            <div id="url-suggestions" style="display:none"></div>
            <button id="bookmark-btn" title="Bookmark (Ctrl+D)">
                <svg id="bookmark-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
                    <path d="M8 1.5l1.85 3.75 4.15.6-3 2.93.71 4.12L8 10.77 4.29 12.9l.71-4.12-3-2.93 4.15-.6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <!-- Find bar (hidden) -->
        <div id="find-bar" style="display:none">
            <input id="find-input" type="text" placeholder="Find in page..." spellcheck="false" autocomplete="off">
            <span id="find-count"></span>
            <button id="find-prev" title="Previous"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M12 10L8 6l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <button id="find-next" title="Next"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <button id="find-close" title="Close"><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        </div>

        <!-- Downloads section (hidden) -->
        <div id="downloads-section" style="display:none">
            <div class="section-label">Downloads</div>
            <div id="download-list"></div>
        </div>

        <!-- Menu popup (hidden) -->
        <div id="menu-popup" style="display:none">
            <div class="menu-item" id="menu-history">History (Ctrl+H)</div>
            <div class="menu-item" id="menu-bookmarks">Bookmarks</div>
            <div class="menu-item" id="menu-downloads">Downloads</div>
            <div class="menu-separator"></div>
            <div class="menu-item" id="menu-zoom-in">Zoom In (Ctrl+=)</div>
            <div class="menu-item" id="menu-zoom-out">Zoom Out (Ctrl+-)</div>
            <div class="menu-item" id="menu-zoom-reset">Reset Zoom (Ctrl+0)</div>
            <div class="menu-separator"></div>
            <div class="menu-item" id="menu-find">Find (Ctrl+F)</div>
            <div class="menu-item" id="menu-print">Print (Ctrl+P)</div>
            <div class="menu-item" id="menu-fullscreen">Fullscreen (F11)</div>
            <div class="menu-separator"></div>
            <div class="menu-item" id="menu-incognito">New Incognito Tab</div>
            <div class="menu-separator"></div>
            <div class="menu-item" id="menu-download-dir">Download Directory...</div>
            <div class="menu-separator"></div>
            <div class="section-label" style="padding:6px 12px">Search Engine</div>
            <div id="search-engine-options">
                <div class="search-engine-option active" data-engine="google">Google</div>
                <div class="search-engine-option" data-engine="ddg">DuckDuckGo</div>
                <div class="search-engine-option" data-engine="bing">Bing</div>
                <div class="search-engine-option" data-engine="brave">Brave Search</div>
            </div>
        </div>

        <!-- History panel (hidden) -->
        <div id="history-panel" style="display:none">
            <div class="section-label">
                History
                <button id="history-clear" class="small-btn">Clear</button>
                <button id="history-close" class="small-btn">Close</button>
            </div>
            <div id="history-list"></div>
        </div>

        <!-- Pinned tabs -->
        <div id="pinned-tabs"></div>

        <!-- Bookmarks section -->
        <div id="bookmarks-section" style="display:none">
            <div class="section-label">Bookmarks</div>
            <div id="bookmark-list"></div>
        </div>

        <!-- Tab section label -->
        <div id="tabs-label">Tabs</div>

        <!-- Progress bar -->
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>

        <!-- Tab list -->
        <div id="tab-list"></div>

        <!-- Footer -->
        <div id="sidebar-footer">
            <button id="new-tab-btn" title="New Tab (Ctrl+T)">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>
    <div id="tab-context-menu" style="display:none"></div>
    <script src="orb://chrome/app.js"></script>
</body>
</html>
